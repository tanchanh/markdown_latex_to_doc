<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown & LaTeX To Word / Docs - D.T.Chánh</title>

    <!-- Thư viện Marked (Xử lý Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        if (typeof marked === 'undefined') {
            document.write('<script src="js/marked.min.js"><\/script>');
        }
    </script>

    <!-- Cấu hình MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: { '[+]': ['ams'] }
            },
            svg: {
                fontCache: 'none',
                scale: 1,
                minScale: 1
            },
            startup: { typeset: false }
        };
    </script>
    <!-- Thư viện MathJax (Xử lý Toán) -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
        if (typeof MathJax === 'undefined' || !MathJax.typesetPromise) {
            document.write('<script id="MathJax-script" async src="js/tex-svg.js"><\/script>');
        }
    </script>

    <style>
        /* --- CSS TỰ VIẾT (NO EXTERNAL LIBS) --- */

        :root {
            --primary-color: #0a00d1;
            /* Indigo 600 */
            --primary-hover: #4338ca;
            /* Indigo 700 */
            --bg-color: #f8fafc;
            /* Slate 50 */
            --border-color: #b5d5ff;
            /* Slate 200 */
            --text-color: #000000;
            /* Slate 700 */
            --toolbar-bg: #f1f5f9;
            /* Slate 100 */
            --toolbar-text: #475569;
            --btn-border: #cbcbcb;
            --btn-hover-bg: #eef2ff;
            --code-color: #ef4444;
            --code-bg: #f1f5f9;
            --divider-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 1.1rem;
        }

        /* --- Header --- */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1.0rem;
            box-shadow: 0 0.1rem 0.3rem rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            z-index: 10;
            flex-shrink: 0;
        }

        header svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.3rem;
        }

        /* --- Main Layout --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        .column {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background-color: white;
        }

        .column:last-child {
            border-right: none;
        }

        /* --- Toolbar --- */
        .toolbar {
            background-color: var(--toolbar-bg);
            padding: 0.5rem 1.0rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.0rem;
            font-weight: bold;
            color: var(--toolbar-text);
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- Button Style --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            background-color: white;
            color: var(--primary-color);
            border: 2px solid var(--btn-border);
            padding: 0.5rem 0.5rem;
            border-radius: 0.3rem;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0.1rem 0.1rem rgba(0, 0, 0, 0.05);
            font-family: inherit;
            height: 2.4rem;
            /* Giữ chiều cao cố định để không bị giật khi ẩn SVG */
            line-height: 1;
        }

        .btn:hover {
            background-color: var(--btn-hover-bg);
            border-color: var(--primary-color);
        }

        .btn svg {
            width: 1.0rem;
            height: 1.0rem;
            flex-shrink: 0;
        }

        .btn span {
            display: inline-block;
        }

        /* --- Input Area --- */
        #latex-input {
            flex: 1;
            width: 100%;
            padding: 1.0rem;
            border: none;
            resize: none;
            outline: none;
            font-family: "Consolas", "Monaco", "Courier New", monospace;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* --- Output Area --- */
        #latex-output {
            flex: 1;
            padding: 2.0rem;
            overflow-y: auto;
            word-wrap: break-word;
        }

        /* --- Markdown Styles --- */
        .markdown-body {
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* Gộp chung thuộc tính của tiêu đề */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        /* Gộp đường gạch chân của h1 và h2 */
        .markdown-body h1,
        .markdown-body h2 {
            border-bottom: 2px solid var(--divider-color);
            padding-bottom: 0.3rem;
        }

        .markdown-body h1 {
            font-size: 1.5rem;
        }

        .markdown-body h2 {
            font-size: 1.4rem;
        }

        .markdown-body h3 {
            font-size: 1.3rem;
        }

        .markdown-body p {
            margin-bottom: 1.0rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2.0rem;
            margin-bottom: 1.0rem;
        }

        .markdown-body code {
            background-color: var(--code-bg);
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--code-color);
        }

        /* --- MathJax Fixes --- */
        mjx-container[display="false"] {
            margin: 0 0.1rem !important;
            vertical-align: middle !important;
        }

        /* --- Scrollbar Customization --- */
        ::-webkit-scrollbar {
            width: 0.5rem;
            height: 0.5rem;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 0.3rem;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* --- Tên tác giả --- */
        header .author {
            font-style: normal;
            font-size: 1.2rem;
            color: white;
            margin-left: auto;
        }

        /* --- Fullscreen styles --- */
        body.fullscreen-active header,
        body.fullscreen-active .author {
            display: none !important;
        }

        body.fullscreen-active main .column:first-child {
            display: none !important;
        }

        body.fullscreen-active main .column:last-child {
            width: 100% !important;
            border-right: none !important;
        }

        @media (max-width: 48.0rem) {
            main {
                flex-direction: column;
            }

            .column {
                width: 100%;
                height: 50%;
                border-right: none;
                border-bottom: 2px solid var(--border-color);
            }

            body.fullscreen-active main .column:last-child {
                height: 100% !important;
            }

            header h1 {
                font-size: 1.0rem;
            }

            #latex-input,
            #latex-output {
                padding: 1rem;
            }
        }
    </style>
</head>

    <script>
        const input = document.getElementById('latex-input');
        const output = document.getElementById('latex-output');
        let promise = Promise.resolve();

        function escapeMath(text) {
            const mathBlocks = [];
            const regex = /\$\$([\s\S]*?)\$\$|\\\[([\s\S]*?)\\\]|\$([^$\n]*?)\$|\\\(([\s\S]*?)\\\)/g;

            const protectedText = text.replace(regex, (match, g1, g2, g3, g4) => {
                const content = g1 || g2 || g3 || g4;
                if (content && (content.includes('\n#') || content.trim().startsWith('#'))) {
                    return match;
                }

                mathBlocks.push(match);
                const placeholder = `MATHJAXBLOCKPLACEHOLDER${mathBlocks.length - 1}`;

                if (match.startsWith('$$') || match.startsWith('\\[')) {
                    return `\n\n${placeholder}\n\n`;
                }
                return placeholder;
            });
            return { protectedText, mathBlocks };
        }

        function escapeHtmlLite(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function renderContent() {
            const rawText = input.value;
            const { protectedText, mathBlocks } = escapeMath(rawText);
            let htmlContent = marked.parse(protectedText);

            mathBlocks.forEach((block, index) => {
                const safeBlock = escapeHtmlLite(block);
                htmlContent = htmlContent.replace(`MATHJAXBLOCKPLACEHOLDER${index}`, safeBlock);
            });

            output.innerHTML = htmlContent;

            if (window.MathJax) {
                promise = promise.then(() => {
                    return MathJax.typesetPromise([output]);
                }).catch((err) => console.log('MathJax Error:', err));
            }
            updateDownloadImportButton();
        }

        let timeoutId;
        input.addEventListener('input', () => {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(renderContent, 50);
        });

        window.addEventListener('load', renderContent);

        async function copyInput() {
            const btn = document.getElementById('btn-copy-input');
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');
            const originalText = span.innerHTML;

            span.innerHTML = '✓ Đã chép!';
            span.style.color = '#16a34a';
            svg.style.display = 'none';

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(input.value);
                } else {
                    // Fallback cho trình duyệt cũ hoặc môi trường không bảo mật
                    input.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                }
            } catch (err) {
                console.warn('Clipboard API error, falling back to execCommand:', err);
                try {
                    input.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                } catch (e) {
                    console.error('Tất cả phương thức sao chép đều thất bại:', e);
                    span.innerHTML = 'Lỗi copy!';
                    span.style.color = '#ef4444';
                }
            }

            setTimeout(() => {
                span.innerHTML = originalText;
                span.style.color = '';
                svg.style.display = '';
            }, 1500);
        }

        // --- HÀM XÓA NỘI DUNG (CẢI TIẾN: Không dùng confirm) ---
        let clearTimeoutId;
        function clearInput() {
            const btn = document.getElementById('btn-clear');
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');

            if (btn.dataset.confirm === "true") {
                // Hành động xóa
                input.value = "";
                renderContent();
                input.focus();

                // Reset nút
                resetClearBtn(btn);
            } else {
                // Chuyển sang trạng thái xác nhận
                btn.dataset.confirm = "true";
                btn.dataset.originalText = span.innerHTML; // Lưu chữ gốc

                span.innerHTML = 'Chắc chắn?';
                span.style.color = '#dc2626';
                span.style.fontWeight = 'bold';
                btn.style.borderColor = '#dc2626';
                svg.style.display = 'none';

                // Tự động hủy sau 3s nếu không bấm tiếp
                clearTimeoutId = setTimeout(() => {
                    resetClearBtn(btn);
                }, 3000);
            }
        }

        function resetClearBtn(btn) {
            clearTimeout(clearTimeoutId);
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');

            btn.dataset.confirm = "false";
            span.innerHTML = btn.dataset.originalText;
            span.style.color = '';
            span.style.fontWeight = '';
            btn.style.borderColor = ''; // Reset về CSS mặc định
            svg.style.display = '';
        }

        function saveHtml() {
            const content = document.getElementById('latex-output').innerHTML;
            const styles = document.querySelector('style').innerHTML;

            const html = `<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kết quả xuất HTML</title>
<style>${styles}</style>
<style>
    body { padding: 2.0rem; background-color: #fff; max-width: 56.3rem; margin: 0 auto; }
</style>
</head>
<body>
<div class="markdown-body">
${content}
</div>
</body>
</html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const fileName = `Ket_Qua_${year}-${month}-${day}_${hours}-${minutes}-${seconds}.html`;

            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadMd() {
            const content = input.value;
            const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const fileName = `Bai_Viet_${year}-${month}-${day}_${hours}-${minutes}-${seconds}.md`;

            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleFullscreen() {
            const bodyEl = document.body;
            const btn = document.getElementById('btn-fullscreen');
            const icon = document.getElementById('fullscreen-icon');
            const isFullscreen = bodyEl.classList.toggle('fullscreen-active');

            if (isFullscreen) {
                btn.querySelector('span').textContent = 'Thu Nhỏ';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9V4.5M15 9h4.5M15 9l5.25-5.25M15 15v4.5M15 15h4.5M15 15l5.25 5.25" />';
            } else {
                btn.querySelector('span').textContent = 'Phóng To';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />';
            }
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('latex-output')]);
            }
        }

        async function svgToPngDataUrl(svgElement) {
            return new Promise((resolve, reject) => {
                try {
                    const rect = svgElement.getBoundingClientRect();
                    const scaleFactor = 3;

                    if (rect.width === 0 || rect.height === 0) { resolve(null); return; }

                    const width = Math.ceil(rect.width * scaleFactor);
                    const height = Math.ceil(rect.height * scaleFactor);

                    const clonedSvg = svgElement.cloneNode(true);

                    const computedStyle = window.getComputedStyle(svgElement);
                    clonedSvg.style.cssText = `
                        font-family: ${computedStyle.fontFamily};
                        font-size: ${computedStyle.fontSize};
                        font-weight: ${computedStyle.fontWeight};
                        color: ${computedStyle.color};
                        width: ${width}px;
                        height: ${height}px;
                    `;

                    clonedSvg.setAttribute("width", width + "px");
                    clonedSvg.setAttribute("height", height + "px");

                    if (!clonedSvg.getAttribute('xmlns')) clonedSvg.setAttribute('xmlns', "http://www.w3.org/2000/svg");
                    if (!clonedSvg.getAttribute('xmlns:xlink')) clonedSvg.setAttribute('xmlns:xlink', "http://www.w3.org/1999/xlink");

                    const svgData = new XMLSerializer().serializeToString(clonedSvg);
                    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
                    const url = URL.createObjectURL(blob);

                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext("2d");
                        ctx.clearRect(0, 0, width, height);
                        ctx.drawImage(img, 0, 0, width, height);
                        URL.revokeObjectURL(url);
                        resolve(canvas.toDataURL("image/png"));
                    };
                    img.onerror = (e) => reject(new Error("Image failed to load"));
                    img.src = url;
                } catch (e) {
                    reject(e);
                }
            });
        }

        async function copyOutput() {
            const btn = document.getElementById('btn-copy-output');
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');
            const originalText = span.innerHTML;

            span.innerHTML = 'Đang xử lý...';
            span.style.color = '#4f46e5';
            svg.style.display = 'none';

            try {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = output.innerHTML;
                tempDiv.style.position = 'fixed';
                tempDiv.style.left = '-9999px';
                tempDiv.style.width = '1000px';
                tempDiv.style.backgroundColor = '#ffffff';
                tempDiv.classList.add('markdown-body');

                tempDiv.style.fontFamily = getComputedStyle(document.body).fontFamily;

                document.body.appendChild(tempDiv);

                if (window.MathJax) {
                    await MathJax.typesetPromise([tempDiv]);
                }

                const realSvgs = tempDiv.querySelectorAll('mjx-container svg');
                const tempContainers = tempDiv.querySelectorAll('mjx-container');

                const conversionPromises = Array.from(realSvgs).map(async (svgEl, index) => {
                    try {
                        const pngData = await svgToPngDataUrl(svgEl);
                        const container = tempContainers[index];

                        if (pngData && container) {
                            const imgTag = document.createElement('img');
                            imgTag.src = pngData;

                            const rect = svgEl.getBoundingClientRect();
                            imgTag.style.width = rect.width + 'px';
                            imgTag.style.height = rect.height + 'px';
                            imgTag.style.verticalAlign = '-0.5ex';

                            const isDisplay = container.getAttribute('display') === 'true';

                            if (isDisplay) {
                                const divWrapper = document.createElement('div');
                                divWrapper.style.textAlign = 'center';
                                divWrapper.style.margin = '12px 0';
                                divWrapper.appendChild(imgTag);
                                container.replaceWith(divWrapper);
                                divWrapper.insertAdjacentHTML('beforebegin', '<br>');
                                divWrapper.insertAdjacentHTML('afterend', '<br>');
                            } else {
                                container.innerHTML = '';
                                container.appendChild(document.createTextNode('\u00A0'));
                                container.appendChild(imgTag);
                                container.appendChild(document.createTextNode('\u00A0'));
                            }
                        }
                    } catch (e) {
                        console.error("Skip error SVG", index);
                    }
                });

                await Promise.all(conversionPromises);

                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);

                const successful = document.execCommand('copy');
                document.body.removeChild(tempDiv);
                selection.removeAllRanges();

                if (successful) {
                    span.innerHTML = '✓ Đã chép xong!';
                    span.style.color = '#16a34a';
                } else {
                    span.innerHTML = 'Lỗi copy!';
                    span.style.color = '#ef4444';
                }
            } catch (err) {
                console.error(err);
                span.innerHTML = 'Lỗi xử lý!';
                span.style.color = '#ef4444';
            }

            setTimeout(() => {
                span.innerHTML = originalText;
                span.style.color = '';
                svg.style.display = '';
            }, 2000);
        }

        function handleMdBtnClick() {
            const btn = document.getElementById('btn-download-md');
            if (btn.dataset.mode === "import") {
                document.getElementById('file-selector').click();
            } else {
                downloadMd();
            }
        }

        function updateDownloadImportButton() {
            const btn = document.getElementById('btn-download-md');
            if (!btn) return;
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');

            if (input.value.trim() === "") {
                // Trạng thái Nhập MD
                btn.title = "Nhập file Markdown hoặc TXT";
                span.textContent = "Nhập MD";
                svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 00-2.25 2.25v9a2.25 2.25 0 002.25 2.25h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25H15m0-3l-3-3m0 0l-3 3m3-3V15" />`;
                btn.dataset.mode = "import";
            } else {
                // Trạng thái Tải MD
                btn.title = "Tải về file Markdown";
                span.textContent = "Tải MD";
                svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />`;
                btn.dataset.mode = "download";
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                handleFileImport(files[0]);
                event.target.value = '';
            }
        }

        function handleFileImport(file) {
            const extension = file.name.split('.').pop().toLowerCase();
            if (extension === 'md' || extension === 'txt') {
                const reader = new FileReader();
                reader.onload = (event) => {
                    input.value = event.target.result;
                    renderContent();
                    input.focus();
                };
                reader.readAsText(file);
            } else {
                alert('Chỉ hỗ trợ kéo thả hoặc nhập file có định dạng .md hoặc .txt!');
            }
        }

        // Đăng ký các sự kiện kéo thả file trên window
        const dragOverlay = document.getElementById('drag-overlay');

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (e.dataTransfer.types.includes('Files')) {
                dragOverlay.style.display = 'flex';
            }
        });

        window.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null || !document.documentElement.contains(e.relatedTarget)) {
                dragOverlay.style.display = 'none';
            }
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'none';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileImport(files[0]);
            }
        });

        window.addEventListener('dragend', () => {
            dragOverlay.style.display = 'none';
        });
    </script>
